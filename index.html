<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Windows 7 Aero Ultimate Experience</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.3);
            --aero-blue: rgba(0, 162, 255, 0.6);
            --reflection: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 51%, rgba(255,255,255,0.1) 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            /* Kultowa tapeta Windows 7 Aurora */
            background: #004e8c url('https://wallpaperaccess.com/full/1567665.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            overflow-x: hidden;
        }

        /* CAŁA STRONA JAKO JEDNO WIELKIE AERO */
        .aero-page-wrapper {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            min-height: 4000px; /* Bardzo długa strona */
            border-left: 1px solid rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.2);
            width: 1000px;
            margin: 0 auto;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* PASEK GÓRNY - SCALA SIĘ NA POCZĄTKU */
        .top-aero-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--aero-blue);
            background-image: var(--reflection);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            z-index: 3000;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* KROPLE - UKRYTE NA GÓRZE W PASKU */
        .floating-nav {
            position: fixed;
            right: 50px;
            top: 100px;
            z-index: 4000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
